<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Solo Leveling | Hunter System</title>
    <link rel="stylesheet" href="/static/solo-leveling.css">
</head>
<body>
    <div id="app">
        <div class="sl-root">
            <div class="sl-grid-bg"></div>
            <div id="hunter-container" class="sl-container" style="display: none;">
                <!-- Hunter Dashboard injected here -->
            </div>
            <div id="auth-root" class="sl-container">
                <!-- Login/Register form injected here -->
                <div id="loading" style="color: #60a5fa; text-align: center; padding: 100px; font-family: sans-serif;">
                    INITIALIZING HUNTER SYSTEM...
                </div>
            </div>
        </div>
    </div>
    <script src="/static/main.js"></script>
    <div id="yt-player" style="position: absolute; width: 0; height: 0; pointer-events: none; opacity: 0; border: none;"></div>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        // Block all zoom gestures

        document.addEventListener('gesturestart', function(e) { e.preventDefault(); });
        document.addEventListener('gesturechange', function(e) { e.preventDefault(); });
        document.addEventListener('gestureend', function(e) { e.preventDefault(); });
        document.addEventListener('touchmove', function(e) {
            if (e.touches.length > 1) { e.preventDefault(); }
        }, { passive: false });
        // Block double-tap zoom
        let lastTouchEnd = 0;
        document.addEventListener('touchend', function(e) {
            const now = Date.now();
            if (now - lastTouchEnd <= 300) { e.preventDefault(); }
            lastTouchEnd = now;
        }, false);
        // Block Ctrl+scroll zoom on desktop
        document.addEventListener('wheel', function(e) {
            if (e.ctrlKey) { e.preventDefault(); }
        }, { passive: false });
        // Block Ctrl+Plus/Minus zoom on desktop
        document.addEventListener('keydown', function(e) {
            if ((e.ctrlKey || e.metaKey) && (e.key === '+' || e.key === '-' || e.key === '=' || e.key === '0')) {
                e.preventDefault();
            }
        });
    </script>
</body>
</html>
